<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WACKO Presentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a192f 0%, #1e3c72 50%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .presentation-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .slide {
            width: 90%;
            max-width: 1400px;
            height: 85vh;
            background: linear-gradient(135deg, #1a2a4a 0%, #243655 100%);
            border-radius: 20px;
            box-shadow: 0 25px 70px rgba(0, 255, 255, 0.2);
            padding: 20px;
            display: none;
            animation: slideIn 0.5s ease;
            position: relative;
            border: 2px solid #00ffff;
        }

        .slide.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        .slide-number {
            position: absolute;
            top: 20px;
            right: 30px;
            background: linear-gradient(135deg, #00ff7f 0%, #00ffff 100%);
            color: #0a192f;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            z-index: 10;
        }

        .navigation {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 1000;
        }

        .nav-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #00ff7f 0%, #00ffff 100%);
            color: #0a192f;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 255, 0.6);
            background: linear-gradient(135deg, #00ffff 0%, #00ff7f 100%);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .title-overlay {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .title-overlay h1 {
            color: #00ffff;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .title-overlay p {
            color: #ffa500;
            font-size: 1.2em;
            text-shadow: 0 0 10px rgba(255, 165, 0, 0.4);
        }

        .progress-bar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff7f 0%, #00ffff 100%);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .slide-indicator {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffff;
            font-size: 1.1em;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* Loading animation */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffff;
            font-size: 1.5em;
            display: none;
        }

        .slide.loading .loading {
            display: block;
        }

        .slide.loading img {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="presentation-container">
        <!-- Title Overlay -->
        <div class="title-overlay">
            <h1>🎯 WACKO</h1>
            <p>📊 Strategic Analysis & Insights</p>
        </div>

        <!-- Slides -->
        <div class="slide active" data-slide="1">
            <div class="slide-number">1 / 5</div>
            <div class="loading">Loading...</div>
            <img src="wacko-slides/slide-1.png" alt="Slide 1" onload="this.parentElement.classList.remove('loading')">
        </div>

        <div class="slide" data-slide="2">
            <div class="slide-number">2 / 5</div>
            <div class="loading">Loading...</div>
            <img src="wacko-slides/slide-2.png" alt="Slide 2" onload="this.parentElement.classList.remove('loading')">
        </div>

        <div class="slide" data-slide="3">
            <div class="slide-number">3 / 5</div>
            <div class="loading">Loading...</div>
            <img src="wacko-slides/slide-3.png" alt="Slide 3" onload="this.parentElement.classList.remove('loading')">
        </div>

        <div class="slide" data-slide="4">
            <div class="slide-number">4 / 5</div>
            <div class="loading">Loading...</div>
            <img src="wacko-slides/slide-4.png" alt="Slide 4" onload="this.parentElement.classList.remove('loading')">
        </div>

        <div class="slide" data-slide="5">
            <div class="slide-number">5 / 5</div>
            <div class="loading">Loading...</div>
            <img src="wacko-slides/slide-5.png" alt="Slide 5" onload="this.parentElement.classList.remove('loading')">
        </div>

        <!-- Navigation -->
        <div class="navigation">
            <button class="nav-btn" onclick="window.location.href='../../index.html'">🏠 Home</button>
            <button class="nav-btn" onclick="window.location.href='index.html'">📚 Resources</button>
            <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)">← Previous</button>
            <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">Next →</button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>

        <!-- Slide Indicator -->
        <div class="slide-indicator" id="slideIndicator">
            Slide 1 of 5
        </div>
    </div>

    <script>
        let currentSlide = 1;
        const totalSlides = 5;

        function showSlide(n) {
            const slides = document.querySelectorAll('.slide');

            // Wrap around
            if (n > totalSlides) currentSlide = 1;
            if (n < 1) currentSlide = totalSlides;

            // Hide all slides
            slides.forEach(slide => {
                slide.classList.remove('active');
            });

            // Show current slide
            slides[currentSlide - 1].classList.add('active');

            // Update navigation buttons
            document.getElementById('prevBtn').disabled = currentSlide === 1;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides;

            // Update progress bar
            const progressPercent = (currentSlide / totalSlides) * 100;
            document.getElementById('progressBar').style.width = progressPercent + '%';

            // Update slide indicator
            document.getElementById('slideIndicator').textContent = `Slide ${currentSlide} of ${totalSlides}`;
        }

        function changeSlide(direction) {
            currentSlide += direction;
            showSlide(currentSlide);
        }

        // Keyboard navigation
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowLeft') {
                changeSlide(-1);
            } else if (event.key === 'ArrowRight') {
                changeSlide(1);
            } else if (event.key === 'Home') {
                currentSlide = 1;
                showSlide(currentSlide);
            } else if (event.key === 'End') {
                currentSlide = totalSlides;
                showSlide(currentSlide);
            }
        });

        // Touch/swipe support for mobile
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', function(event) {
            touchStartX = event.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', function(event) {
            touchEndX = event.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) {
                changeSlide(1); // Swipe left = next slide
            }
            if (touchEndX > touchStartX + 50) {
                changeSlide(-1); // Swipe right = previous slide
            }
        }

        // Initialize
        showSlide(1);

        // Preload all images
        for (let i = 1; i <= totalSlides; i++) {
            const img = new Image();
            img.src = `wacko-slides/slide-${i}.png`;
        }
    </script>
</body>
</html>
